name: Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - run: |
          python << 'PYEOF'
          import httpx, json
          from urllib.parse import urlparse, parse_qs
          
          r = httpx.get('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt', timeout=30)
          t = r.text
          configs = []
          n = 0
          
          for l in t.split('\n'):
              l = l.strip()
              if not l or l.startswith('#'):
                  continue
              n += 1
              if l.startswith('https://t.me/proxy?'):
                  parsed = urlparse(l)
                  params = parse_qs(parsed.query)
                  server = params.get('server', [''])[0]
                  port = params.get('port', ['443'])[0]
                  secret = params.get('secret', [''])[0]
                  if server:
                      configs.append({
                          'tag': f'mtproto_{n}',
                          'type': 'mtproto',
                          'server': server,
                          'port': int(port),
                          'secret': secret
                      })
          
          with open('configs.json', 'w') as f:
              json.dump(configs, f, indent=2)
          print(f'Done: {len(configs)} proxies')
          PYEOF
      - run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add configs.json
          git commit -m "Update" && git push || echo "No changes"
